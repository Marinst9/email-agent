<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 600px; padding: 40px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #aaa; margin-bottom: 40px; font-size: 1.1rem; }
        .cards { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .card { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 30px; flex: 1; cursor: pointer; transition: all 0.3s; }
        .card:hover { border-color: #667eea; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(102,126,234,0.2); }
        .card.selected { border-color: #667eea; background: #1e1e3f; }
        .card .icon { font-size: 2.5rem; margin-bottom: 15px; }
        .card h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .card p { font-size: 0.9rem; color: #888; margin: 0; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; transition: opacity 0.3s; text-decoration: none; display: inline-block; }
        .btn:hover { opacity: 0.9; }
        .google-btn { display: inline-flex; align-items: center; gap: 12px; background: #fff; color: #333; border: none; padding: 14px 30px; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-bottom: 30px; text-decoration: none; font-weight: 500; }
        .google-btn:hover { background: #f0f0f0; }
        .user-info { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 15px 25px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; }
        .logout { color: #e74c3c; text-decoration: none; font-size: 0.85rem; margin-left: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Email AI Agent</h1>
        <p>Твојот паметен асистент за мејлови</p>

        {% if user %}
            <div class="user-info">
                <img src="{{ user.picture }}" alt="avatar">
                <div style="text-align:left">
                    <div style="font-weight:bold">{{ user.name }}</div>
                    <div style="font-size:0.85rem; color:#aaa">{{ user.email }}</div>
                </div>
                <a href="/logout" class="logout">Одјави се</a>
            </div>

            <form action="/start" method="POST">
                <div class="cards">
                    <div class="card" onclick="selectMode('auto', this)">
                        <div class="icon">🤖</div>
                        <h3>Автоматски режим</h3>
                        <p>Агентот одговара сам без потврда</p>
                    </div>
                    <div class="card selected" onclick="selectMode('manual', this)">
                        <div class="icon">✋</div>
                        <h3>Режим со потврда</h3>
                        <p>Ти одобруваш секој одговор</p>
                    </div>
                </div>
                <input type="hidden" name="mode" id="mode-input" value="manual">
                <button type="submit" class="btn">🚀 Стартувај агент</button>
            </form>
        {% else %}
            <a href="/login" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Логирај се со Google
            </a>
        {% endif %}
    </div>

    <script>
        function selectMode(mode, el) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('mode-input').value = mode;
        }
    </script>
</body>
</html>
