<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>Статистики - Email AI Agent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; }
        .navbar { background: #1a1a2e; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .navbar h1 { font-size: 1.3rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .navbar a { color: #aaa; text-decoration: none; padding: 8px 15px; border-radius: 8px; }
        .navbar a:hover { background: #2a2a4a; color: #fff; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 20px; text-align: center; }
        .stat-card .number { font-size: 2.5rem; font-weight: bold; color: #667eea; }
        .stat-card .label { color: #aaa; font-size: 0.85rem; margin-top: 5px; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 20px; }
        .chart-card h3 { margin-bottom: 15px; color: #ddd; font-size: 1rem; }
        .number-green { color: #27ae60; }
        .number-red { color: #e74c3c; }
        .number-gray { color: #888; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📧 Email AI Agent</h1>
        <a href="/dashboard">← Назад кон Dashboard</a>
    </div>

    <div class="container">
        <h2 style="margin-bottom: 20px; color: #ddd;">📊 Статистики</h2>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="number">{{ total }}</div>
                <div class="label">Вкупно мејлови</div>
            </div>
            <div class="stat-card">
                <div class="number number-green">{{ isprateni }}</div>
                <div class="label">✅ Испратени</div>
            </div>
            <div class="stat-card">
                <div class="number number-red">{{ odbieni }}</div>
                <div class="label">❌ Одбиени</div>
            </div>
            <div class="stat-card">
                <div class="number number-gray">{{ ignorirani }}</div>
                <div class="label">⏭️ Игнорирани</div>
            </div>
        </div>

        <div class="charts">
            <div class="chart-card">
                <h3>Извор на одговори</h3>
                <canvas id="sourceChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Категории на мејлови</h3>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <h3>Испратени vs Одбиени vs Игнорирани</h3>
            <canvas id="statusChart" style="max-height: 200px;"></canvas>
        </div>
    </div>

    <script>
        new Chart(document.getElementById('sourceChart'), {
            type: 'doughnut',
            data: {
                labels: ['AI генериран', 'Шаблон'],
                datasets: [{
                    data: [{{ ai_gen }}, {{ shablon }}],
                    backgroundColor: ['#667eea', '#f39c12'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { labels: { color: '#aaa' } } } }
        });

        const cats = {{ categories | tojson }};
        new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(cats),
                datasets: [{
                    data: Object.values(cats),
                    backgroundColor: ['#5dade2', '#e74c3c', '#f39c12', '#888', '#27ae60'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { labels: { color: '#aaa' } } } }
        });

        new Chart(document.getElementById('statusChart'), {
            type: 'bar',
            data: {
                labels: ['Испратени', 'Одбиени', 'Игнорирани'],
                datasets: [{
                    data: [{{ isprateni }}, {{ odbieni }}, {{ ignorirani }}],
                    backgroundColor: ['#27ae60', '#e74c3c', '#888'],
                    borderRadius: 6,
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { ticks: { color: '#aaa' }, grid: { color: '#2a2a3a' } },
                    x: { ticks: { color: '#aaa' }, grid: { display: false } }
                }
            }
        });
    </script>
</body>
</html>
